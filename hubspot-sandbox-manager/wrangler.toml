name = "hubspot-sandbox-manager"
main = "worker.js"
compatibility_date = "2024-01-01"

[vars]
ALLOWED_ORIGIN = "https://mayankacelab.github.io"

# Secrets — set via Cloudflare dashboard or wrangler (never commit these):
#   npx wrangler secret put HUBSPOT_PAT
#   npx wrangler secret put GOOGLE_CLIENT_ID
#   npx wrangler secret put GOOGLE_CLIENT_SECRET
#   npx wrangler secret put COOKIE_SECRET   ← generate with: openssl rand -hex 32
